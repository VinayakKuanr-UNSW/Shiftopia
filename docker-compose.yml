
# Two-layer workforce scheduling architecture
#
# web-app   → Vite React frontend (compliance engine in-browser)
# optimizer → Python OR-Tools CP-SAT service (proposals only, never writes DB)
#
# Flow:  web-app → http://optimizer:5005/optimize → proposals
#                → compliance engine validates
#                → Supabase commit

services:
  optimizer:
    build:
      context: ./optimizer-service
      dockerfile: Dockerfile
    container_name: superman-optimizer
    ports:
      - '5005:8080'
    environment:
      - LOG_LEVEL=info
      # ── Phase 3 — production hardening ────────────────────────────────
      # Auth: dev-bypass keeps localhost workflows simple. In prod, set
      # SUPABASE_JWT_SECRET to the project's HS256 JWT secret and remove
      # OPTIMIZER_AUTH_DISABLED (or set it to false).
      - OPTIMIZER_AUTH_DISABLED=${OPTIMIZER_AUTH_DISABLED:-true}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - SUPABASE_JWT_AUDIENCE=${SUPABASE_JWT_AUDIENCE:-authenticated}
      # CORS allowlist — comma-separated origins. Default covers Vite
      # dev (5173) and the local web-app (8080).
      - OPTIMIZER_CORS_ORIGINS=${OPTIMIZER_CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      # Rate limits (per-IP). Bump under load test; tighten in prod.
      - OPTIMIZER_RATE_OPTIMIZE=${OPTIMIZER_RATE_OPTIMIZE:-30/minute}
      - OPTIMIZER_RATE_AUDIT=${OPTIMIZER_RATE_AUDIT:-60/minute}
      # OpenTelemetry — set to a collector endpoint (e.g.
      # http://otel-collector:4317) to enable. Empty = no-op tracing.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-superman-optimizer}
    restart: unless-stopped
    healthcheck:
      # Liveness probe — `/health` is the cheap one. K8s should switch
      # to `/ready` for `readinessProbe` (also checks JWT + OR-Tools).
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: superman-ml
    ports:
      - '8000:8000'
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Uncomment to run the web-app in Docker too
