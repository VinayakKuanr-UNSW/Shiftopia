name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      # Lint is temporarily disabled — eslint 9 / @typescript-eslint version
      # mismatch breaks rule loading. Re-enable after upgrading the plugin.
      # - name: Lint
      #   run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          # Source-map upload is skipped automatically when these are unset
          # (e.g. on PRs from forks). Add them as repo secrets for prod builds.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}
        run: npm run build
